<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kairo · Watch Faces · Phase 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=VT323&display=swap" rel="stylesheet">
<style>
/* ──────────────────────────────────────────────────────────────
   THEME TOKENS  (same DNA as Style Tile)
   ────────────────────────────────────────────────────────────── */
:root, [data-theme="light"] {
  --bg:        #FEFCF9;
  --surface:   #F7F3ED;
  --surface-2: #F0EBE0;
  --line:      #E8E0D4;
  --line-2:    #D8CFBE;
  --ink:       #1A1538;
  --ink-2:     #3D365E;
  --muted:     #8C8279;
  --accent:    #D85A30;
  --accent-2:  #E27A53;
  --lavender:  #9B8EC4;
  --ok:        #5A9A6B;
  --alert:     #D84130;
  --ink-on-accent: #FAF6EC;
  --case-body: linear-gradient(180deg, #2A2454 0%, #1A1538 60%, #0F0C26 100%);
  --case-bezel: #1A1538;
  --strap-color: #1A1538;
  --face-default: radial-gradient(circle at 30% 25%, #E27A53 0%, #D85A30 55%, #B84520 100%);
  --face-sleep:   radial-gradient(circle at 30% 25%, #2D2654 0%, #1A1538 60%, #0F0C26 100%);
  --face-worried: radial-gradient(circle at 30% 25%, #8B1A1A 0%, #6B1010 100%);
  --shadow-card: 0 1px 0 rgba(26,21,56,0.04), 0 8px 24px -16px rgba(26,21,56,0.12);
  --glow: 0 0 0 rgba(0,0,0,0);
}
[data-theme="dark"] {
  --bg:        #0B0820;
  --surface:   #15102E;
  --surface-2: #1E1840;
  --line:      #261E48;
  --line-2:    #3A2F66;
  --ink:       #F0EBE0;
  --ink-2:     #BFB6D9;
  --muted:     #6A6190;
  --accent:    #FF6B3D;
  --accent-2:  #FF8559;
  --lavender:  #B5A8E0;
  --ok:        #6FBA82;
  --alert:     #FF4B30;
  --ink-on-accent: #FAF6EC;
  --case-body: linear-gradient(180deg, #1E1840 0%, #15102E 60%, #0B0820 100%);
  --case-bezel: #0B0820;
  --strap-color: #15102E;
  --face-default: radial-gradient(circle at 30% 25%, #FF8559 0%, #FF6B3D 50%, #C84218 100%);
  --face-sleep:   radial-gradient(circle at 30% 25%, #3A2F66 0%, #1A1538 65%, #0B0820 100%);
  --face-worried: radial-gradient(circle at 30% 25%, #B82A2A 0%, #7B0F0F 100%);
  --shadow-card: 0 1px 0 rgba(255,255,255,0.02), 0 8px 28px -16px rgba(0,0,0,0.6);
  --glow: 0 0 28px rgba(255,107,61,0.35);
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background-color: var(--bg) !important;
  color: var(--ink);
  font-family: 'Space Grotesk', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  transition: background 240ms ease, color 240ms ease;
  overflow-x: hidden;
}
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; letter-spacing: 0.06em; text-transform: uppercase; font-size: 11px; font-weight: 500; }
.mono.dim { color: var(--muted); }
.mono.accent { color: var(--accent); }
.pixel { font-family: 'VT323', monospace; letter-spacing: 0.05em; }

/* ──────────────────────────────────────────────────────────────
   PAGE SHELL
   ────────────────────────────────────────────────────────────── */
.page {
  max-width: 1240px;
  margin: 0 auto;
  padding: 24px 32px 80px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0 28px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 32px;
}
.brand { display: flex; align-items: baseline; gap: 14px; }
.brand-mark {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  position: relative;
  padding-left: 16px;
}
.brand-mark::before {
  content: '';
  position: absolute;
  left: 0; top: 50%; transform: translateY(-50%);
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 1px;
  box-shadow: var(--glow);
}
.brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

.topbar-right { display: flex; gap: 12px; align-items: center; }
.back-link { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); text-decoration: none; padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; letter-spacing: 0.1em; text-transform: uppercase; transition: all 180ms; }
.back-link:hover { color: var(--accent); border-color: var(--accent); }

.toggle {
  display: inline-flex;
  border: 1px solid var(--line-2);
  border-radius: 999px;
  padding: 3px;
  background: var(--surface);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.toggle button {
  background: transparent;
  border: 0;
  color: var(--muted);
  padding: 6px 14px;
  border-radius: 999px;
  cursor: pointer;
  font: inherit;
  text-transform: inherit;
  letter-spacing: inherit;
  transition: all 180ms ease;
}
.toggle button.active { background: var(--ink); color: var(--bg); }

/* ──────────────────────────────────────────────────────────────
   MAIN LAYOUT
   ────────────────────────────────────────────────────────────── */
.stage-grid {
  display: grid;
  grid-template-columns: 260px 1fr 280px;
  gap: 32px;
  align-items: stretch;
  flex: 1;
}

/* Side panels */
.panel {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 18px 18px 20px;
  position: relative;
}
.panel::before {
  content: '';
  position: absolute;
  top: -1px; left: -1px;
  width: 10px; height: 10px;
  border: 1px solid var(--accent);
  border-right: 0; border-bottom: 0;
}
.panel::after {
  content: '';
  position: absolute;
  bottom: -1px; right: -1px;
  width: 10px; height: 10px;
  border: 1px solid var(--accent);
  border-left: 0; border-top: 0;
}
.panel-title { display: flex; gap: 8px; align-items: baseline; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px dashed var(--line-2); }
.panel-section { margin-top: 18px; }
.panel-section:first-child { margin-top: 0; }
.panel-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

/* Radio chips */
.chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
.chip-radio {
  position: relative;
  padding: 6px 12px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--ink-2);
  font: 500 11px/1 'JetBrains Mono', monospace;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 160ms ease;
}
.chip-radio:hover { border-color: var(--accent); color: var(--accent); }
.chip-radio.active { background: var(--accent); color: var(--bg); border-color: var(--accent); box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--accent); }

/* Event buttons */
.event-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  font: 500 13px 'Space Grotesk', sans-serif;
  cursor: pointer;
  margin-bottom: 6px;
  transition: all 160ms ease;
  text-align: left;
}
.event-btn:hover { border-color: var(--accent); transform: translateX(2px); }
.event-btn .ev-glyph { font-size: 14px; color: var(--accent); }
.event-btn .ev-hap { margin-left: auto; font: 500 9px 'JetBrains Mono', monospace; color: var(--muted); }
.event-btn.danger { border-color: rgba(216,65,48,0.3); }
.event-btn.danger:hover { border-color: var(--alert); color: var(--alert); }
.event-btn.danger .ev-glyph { color: var(--alert); }

/* Toggle row */
.toggle-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 8px;
  margin-bottom: 6px;
}
.toggle-row .toggle-label { font-size: 13px; color: var(--ink); }
.toggle-row .toggle-sub   { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
.toggle-row .switch {
  width: 38px; height: 22px;
  background: var(--surface-2);
  border-radius: 999px;
  position: relative;
  cursor: pointer;
  transition: background 200ms;
  border: 1px solid var(--line-2);
}
.toggle-row .switch::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 16px; height: 16px;
  background: var(--muted);
  border-radius: 50%;
  transition: all 200ms cubic-bezier(.5,.1,.2,1);
}
.toggle-row.on .switch { background: var(--accent); border-color: var(--accent); }
.toggle-row.on .switch::after { left: 18px; background: var(--bg); }

/* ──────────────────────────────────────────────────────────────
   WATCH DEVICE
   ────────────────────────────────────────────────────────────── */
.watch-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  position: relative;
  min-height: 620px;
}

.watch-frame {
  position: relative;
  padding: 60px;
}
.watch-chip-frame {
  position: absolute;
  inset: 24px;
  pointer-events: none;
}
.watch-chip-frame .cf {
  position: absolute;
  width: 28px; height: 28px;
  border: 1.5px solid var(--accent);
  opacity: 0.6;
}
.watch-chip-frame .cf.tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
.watch-chip-frame .cf.tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
.watch-chip-frame .cf.bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
.watch-chip-frame .cf.br { bottom: 0; right: 0; border-left: 0; border-top: 0; }

/* Bracelet straps */
.strap {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  background: var(--strap-color);
  border: 1px solid var(--line);
  pointer-events: none;
}
.strap-top {
  top: -40px;
  height: 80px;
  border-radius: 8px 8px 24px 24px;
  background: linear-gradient(180deg, transparent 0%, var(--strap-color) 30%, var(--strap-color) 100%);
  mask: linear-gradient(180deg, transparent 0%, black 50%);
  -webkit-mask: linear-gradient(180deg, transparent 0%, black 50%);
}
.strap-bottom {
  bottom: -40px;
  height: 80px;
  border-radius: 24px 24px 8px 8px;
  background: linear-gradient(0deg, transparent 0%, var(--strap-color) 30%, var(--strap-color) 100%);
  mask: linear-gradient(0deg, transparent 0%, black 50%);
  -webkit-mask: linear-gradient(0deg, transparent 0%, black 50%);
}

/* Watch case */
.watch-case {
  position: relative;
  width: 340px;
  height: 420px;
  background: var(--case-body);
  border-radius: 56px;
  padding: 40px 24px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 0 30px 80px -30px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05), inset 0 -2px 4px rgba(0,0,0,0.4);
}
.watch-frame.sos .watch-case {
  animation: case-pulse 0.8s ease-in-out infinite;
}
@keyframes case-pulse {
  0%, 100% { box-shadow: 0 30px 80px -30px rgba(0,0,0,0.6), 0 0 0 0 rgba(255,75,48,0); }
  50%      { box-shadow: 0 30px 80px -30px rgba(0,0,0,0.6), 0 0 0 8px rgba(255,75,48,0.18); }
}

/* Top strip — BLE / battery */
.watch-top-strip {
  display: flex; align-items: center; gap: 8px;
  font-size: 8px; color: rgba(240,235,224,0.55);
  margin-bottom: 8px;
  letter-spacing: 0.15em;
}
.watch-top-strip .dot { width: 4px; height: 4px; background: #6FBA82; border-radius: 50%; }
.watch-batt {
  position: relative;
  width: 18px; height: 8px;
  border: 1px solid rgba(240,235,224,0.35);
  border-radius: 1px;
}
.watch-batt::after {
  content: '';
  position: absolute;
  right: -3px; top: 1px;
  width: 2px; height: 4px;
  background: rgba(240,235,224,0.35);
}
.watch-batt-fill {
  position: absolute;
  left: 1px; top: 1px; bottom: 1px;
  background: #6FBA82;
}
.silent-tag { color: var(--lavender); margin-left: auto; }

/* Side button */
.watch-btn {
  position: absolute;
  right: -8px; top: 50%;
  transform: translateY(-50%);
  width: 12px; height: 64px;
  background: linear-gradient(90deg, #1A1538, #0B0820);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 4px;
  padding: 0;
  cursor: pointer;
  z-index: 5;
  transition: all 80ms ease;
}
.watch-btn:hover { right: -6px; }
.watch-btn.pressed { transform: translateY(-50%) translateX(4px); }
.watch-btn::after {
  content: '○ PRESS';
  position: absolute;
  left: 24px; top: 50%;
  transform: translateY(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--muted);
  white-space: nowrap;
  opacity: 0;
  transition: opacity 200ms;
}
.watch-btn:hover::after { opacity: 1; }
.watch-btn-cap { display: block; width: 100%; height: 100%; }

/* AMOLED screen */
.amoled {
  position: relative;
  width: 260px;
  height: 260px;
  border-radius: 50%;
  background: var(--face-default);
  overflow: hidden;
  box-shadow: inset 0 0 0 2px #000, inset 0 0 12px rgba(0,0,0,0.4);
  /* The visible circle on the AMOLED */
}
.amoled-vignette {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.25) 100%);
  pointer-events: none;
  z-index: 4;
}

/* Carousel */
.carousel {
  display: flex;
  width: 400%;
  height: 100%;
  transition: transform 380ms cubic-bezier(.5,.05,.15,1);
}
.screen {
  width: 25%;
  height: 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* Sweep flash on screen change */
.screen-sweep {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 30%, transparent 70%, rgba(255,255,255,0.12) 100%);
  pointer-events: none;
  z-index: 6;
  animation: sweep-flash 460ms ease-out;
  opacity: 0;
}
@keyframes sweep-flash {
  0%   { opacity: 0; transform: translateY(-100%); }
  20%  { opacity: 1; }
  100% { opacity: 0; transform: translateY(100%); }
}

/* Screen dot indicators */
.screen-dots {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  z-index: 5;
}
.s-dot {
  width: 8px; height: 8px;
  background: rgba(26,21,56,0.3);
  border: 0;
  border-radius: 50%;
  padding: 0;
  cursor: pointer;
  transition: all 180ms ease;
}
.s-dot:hover { background: rgba(26,21,56,0.55); transform: scale(1.25); }
.s-dot.active { background: #1A1538; transform: scale(1.5); }
.s-dot.active:hover { transform: scale(1.65); }

/* Silent mode mini icon */
.silent-mini {
  position: absolute;
  top: 22px; right: 22px;
  font-size: 20px;
  color: var(--ink-on-accent);
  opacity: 0.6;
  z-index: 5;
}

/* SOS overlay rings */
.sos-overlay {
  position: absolute;
  inset: 0;
  z-index: 3;
  background: radial-gradient(circle, rgba(139,26,26,0.15) 0%, rgba(139,26,26,0.4) 100%);
  pointer-events: none;
  border-radius: 50%;
}
.sos-ring {
  position: absolute;
  inset: 50%;
  border: 2px solid rgba(255,75,48,0.7);
  border-radius: 50%;
  animation: sos-ring 1.4s ease-out infinite;
}
.sos-ring-2 { animation-delay: 0.45s; }
.sos-ring-3 { animation-delay: 0.9s; }
@keyframes sos-ring {
  0%   { inset: 50%; opacity: 0.9; }
  100% { inset: 0; opacity: 0; }
}

/* Goal flash */
.goal-flash {
  position: absolute;
  inset: 0;
  z-index: 4;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(216,90,48,0.5);
  pointer-events: none;
  animation: goal-flash-anim 1.4s ease-out;
}
.goal-text {
  font-size: 56px;
  color: var(--ink-on-accent);
  letter-spacing: 0.1em;
  text-shadow: 2px 2px 0 #1A1538;
  animation: goal-text-bounce 1.4s cubic-bezier(.5,1.5,.5,1);
}
@keyframes goal-flash-anim {
  0%   { opacity: 0; }
  10%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { opacity: 0; }
}
@keyframes goal-text-bounce {
  0%   { transform: scale(0.5); opacity: 0; }
  30%  { transform: scale(1.1); opacity: 1; }
  60%  { transform: scale(1);   opacity: 1; }
  100% { transform: scale(1.2); opacity: 0; }
}

/* Wake-on-wrist scan line */
.wake-scan {
  position: absolute;
  left: 0; right: 0;
  top: 0;
  height: 4px;
  background: linear-gradient(180deg, rgba(255,255,255,0.4), transparent);
  z-index: 7;
  opacity: 0;
  pointer-events: none;
  animation: wake-scan 6s linear infinite;
}
@keyframes wake-scan {
  0%, 80%, 100% { opacity: 0; top: 0; }
  82% { opacity: 0.9; top: 0; }
  92% { opacity: 0.4; top: 100%; }
}

/* Watch bottom strip */
.watch-bottom-strip {
  display: flex; gap: 6px;
  font-size: 8px;
  color: rgba(240,235,224,0.4);
  letter-spacing: 0.2em;
  margin-top: 12px;
}

/* External screen label */
.watch-screen-label {
  display: inline-flex; align-items: center; gap: 10px;
  margin-top: 8px;
  padding: 4px 6px 4px 6px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface);
}
.watch-screen-label > .mono { padding: 2px 0; }
.watch-screen-nav {
  width: 24px; height: 24px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 50%;
  color: var(--ink);
  font: 600 14px/1 'JetBrains Mono', monospace;
  cursor: pointer;
  display: grid; place-items: center;
  padding: 0;
  transition: all 140ms ease;
}
.watch-screen-nav:hover { border-color: var(--accent); color: var(--accent); }
.watch-screen-nav:active { transform: scale(0.92); }

/* ──────────────────────────────────────────────────────────────
   SCREEN CONTENT
   ────────────────────────────────────────────────────────────── */
.ws {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  text-align: center;
  width: 100%;
  height: 100%;
  padding-top: 8px;
  color: var(--ink-on-accent);
}
.ws-tag {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(26,21,56,0.6);
}
.amoled .mono { color: rgba(26,21,56,0.65); }
.amoled .mono.dim { color: rgba(26,21,56,0.5); }

/* Clock */
.ws-clock-time {
  font-size: 78px;
  line-height: 0.95;
  color: #1A1538;
  letter-spacing: 0.03em;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.06);
}
.ws-clock-sub {
  font-size: 20px;
  color: #1A1538;
  opacity: 0.75;
}
.ws-clock-tick {
  font-size: 8px;
  color: rgba(26,21,56,0.4);
  margin-top: 6px;
}

/* Steps */
.ws-steps-num {
  font-size: 60px;
  line-height: 1;
  color: #1A1538;
  letter-spacing: 0.02em;
  transition: transform 200ms;
}
.ws-steps-num.tick {
  animation: steps-tick 320ms ease-out;
}
@keyframes steps-tick {
  0%   { transform: translateY(0) scale(1); color: #1A1538; }
  40%  { transform: translateY(-4px) scale(1.06); color: #FAF6EC; }
  100% { transform: translateY(0) scale(1); color: #1A1538; }
}
.ws-steps-track {
  position: relative;
  width: 140px;
  height: 6px;
  background: rgba(26,21,56,0.15);
  border-radius: 3px;
  overflow: hidden;
  margin: 6px 0 4px;
}
.ws-steps-fill {
  height: 100%;
  background: #1A1538;
  transition: width 600ms ease-out;
}
.ws-steps-foot { font-size: 13px; color: rgba(26,21,56,0.55); }

/* Message */
.ws-message-from {
  font-size: 26px;
  color: #1A1538;
  margin-top: 4px;
}
.ws-message-time {
  font-size: 9px;
  color: rgba(26,21,56,0.5);
}
.heart-pulse {
  animation: heart-thump 1.2s ease-in-out infinite;
  transform-origin: center;
}
@keyframes heart-thump {
  0%, 30%, 60%, 100% { transform: scale(1); }
  15%, 45% { transform: scale(1.18); }
}
.ws-empty-line {
  font-size: 56px;
  color: rgba(26,21,56,0.4);
}

/* ──────────────────────────────────────────────────────────────
   SPARK (shared with style tile — included for reuse)
   ────────────────────────────────────────────────────────────── */
.spark-root { display: inline-flex; flex-direction: column; align-items: center; gap: 12px; }
.spark-stage {
  position: relative;
  border-radius: 50%;
  animation: spark-breath var(--breath-dur, 2s) ease-in-out infinite alternate;
}
.spark-stage.state-active  { animation: spark-breath var(--breath-dur, 1s) ease-in-out infinite alternate, spark-bob 0.6s ease-in-out infinite alternate; }
.spark-stage.state-sleepy  { animation: spark-breath var(--breath-dur, 3.3s) ease-in-out infinite alternate, spark-drift 6s ease-in-out infinite alternate; }
.spark-stage.state-worried { animation: spark-breath var(--breath-dur, 1.4s) ease-in-out infinite alternate, spark-shake 0.18s steps(2) infinite; }
.spark-face {
  position: absolute; inset: 0;
  border-radius: 50%;
  background: var(--face-default);
  box-shadow: var(--glow);
  overflow: hidden;
}
.spark-stage.state-sleepy  .spark-face { background: var(--face-sleep); }
.spark-stage.state-worried .spark-face { background: var(--face-worried); }
.spark-svg { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
.spark-frame { position: absolute; inset: -6%; pointer-events: none; z-index: 3; }
.spark-frame .cf { position: absolute; width: 14%; height: 14%; border: 1.5px solid var(--accent); opacity: 0.85; }
.spark-frame .cf.tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
.spark-frame .cf.tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
.spark-frame .cf.bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
.spark-frame .cf.br { bottom: 0; right: 0; border-left: 0; border-top: 0; }
.spark-label { display: inline-flex; align-items: center; gap: 10px; padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; background: var(--surface); }

.x-sparkle   { animation: sparkle-fade 1.6s ease-in-out infinite; transform-origin: 13.5px 3.5px; }
.x-sparkle-2 { animation: sparkle-fade 1.6s ease-in-out infinite reverse; transform-origin: 2.5px 13.5px; }
.x-z         { animation: zfloat 3.4s ease-out infinite; }
.x-sweat     { animation: sweat-drip 1.8s ease-in infinite; }

@keyframes spark-breath { from { transform: scale(1); } to { transform: scale(1.04); } }
@keyframes spark-bob { from { translate: 0 0; } to { translate: 0 -3%; } }
@keyframes spark-drift { 0% { translate: -1% 0; } 100% { translate: 1% 0; } }
@keyframes spark-shake { 0%,100% { transform: translate(0); } 25% { transform: translate(1px,-0.5px); } 50% { transform: translate(-1px,0.5px); } 75% { transform: translate(0.5px,1px); } }
@keyframes sparkle-fade { 0%,100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } }
@keyframes zfloat { 0% { transform: translate(0,0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translate(1.5px,-3.5px); opacity: 0; } }
@keyframes sweat-drip { 0% { transform: translate(0,0); opacity: 1; } 100% { transform: translate(0,2px); opacity: 0.3; } }

/* ──────────────────────────────────────────────────────────────
   FOOTER
   ────────────────────────────────────────────────────────────── */
.footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.footer .phase-line { display: flex; gap: 14px; align-items: center; }
.phase-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
}
.phase-pill.current { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.phase-pill.done { border-color: var(--ok); color: var(--ok); }

/* ──────────────────────────────────────────────────────────────
   RESPONSIVE
   ────────────────────────────────────────────────────────────── */
@media (max-width: 1100px) {
  .stage-grid { grid-template-columns: 1fr; gap: 20px; }
  .panel { order: 2; }
  .watch-stage { order: 1; min-height: 540px; }
}
</style>
</head>
<body data-theme="dark">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="spark.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="watch.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function ThemeToggle({ theme, onChange }) {
  return (
    <div className="toggle">
      <button className={theme === 'light' ? 'active' : ''} onClick={() => onChange('light')}>Light</button>
      <button className={theme === 'dark' ? 'active' : ''} onClick={() => onChange('dark')}>Dark</button>
    </div>
  );
}

function ChipRadio({ value, current, onChange, children }) {
  return (
    <button
      className={`chip-radio ${current === value ? 'active' : ''}`}
      onClick={() => onChange(value)}
    >{children}</button>
  );
}

function ToggleRow({ label, sub, on, onChange }) {
  return (
    <div className={`toggle-row ${on ? 'on' : ''}`} onClick={() => onChange(!on)}>
      <div>
        <div className="toggle-label">{label}</div>
        <div className="toggle-sub">{sub}</div>
      </div>
      <div className="switch"></div>
    </div>
  );
}

function WatchFacesApp() {
  const [theme, setTheme] = useState('dark');
  const [sparkState, setSparkState] = useState('calm');
  const [silent, setSilent] = useState(false);
  const [sos, setSos] = useState(false);
  const [parentTouchKey, setParentTouchKey] = useState(0);
  const [goalKey, setGoalKey] = useState(0);
  const [steps, setSteps] = useState(4280);
  const [currentScreen, setCurrentScreen] = useState(0);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    document.body.setAttribute('data-theme', theme);
  }, [theme]);

  return (
    <div className="page" data-screen-label="02 Watch Faces">
      <header className="topbar">
        <div className="brand">
          <span className="brand-mark">KAIRO / WATCH</span>
          <span className="brand-sub">phase 02/04 · the bracelet view</span>
        </div>
        <div className="topbar-right">
          <a className="back-link" href="Style Tile.html">← style tile</a>
          <ThemeToggle theme={theme} onChange={setTheme} />
        </div>
      </header>

      <div className="stage-grid">
        {/* LEFT panel — state + scenarios */}
        <div className="panel">
          <div className="panel-title">
            <span className="mono dim">PANEL/</span>
            <span className="mono accent">STATE</span>
          </div>

          <div className="panel-section">
            <div className="panel-label">Spark state</div>
            <div className="chip-row">
              <ChipRadio value="calm"    current={sparkState} onChange={setSparkState}>Calm</ChipRadio>
              <ChipRadio value="active"  current={sparkState} onChange={setSparkState}>Active</ChipRadio>
              <ChipRadio value="sleepy"  current={sparkState} onChange={setSparkState}>Sleepy</ChipRadio>
              <ChipRadio value="worried" current={sparkState} onChange={setSparkState}>Worried</ChipRadio>
            </div>
          </div>

          <div className="panel-section">
            <div className="panel-label">Modes</div>
            <ToggleRow label="Silent mode" sub="HAP suppressed · school" on={silent} onChange={setSilent} />
            <ToggleRow label="SOS active"  sub="long-press 3s · HAP-01" on={sos} onChange={setSos} />
          </div>

          <div className="panel-section">
            <div className="panel-label">Steps</div>
            <div className="chip-row">
              <ChipRadio value={1200}  current={steps} onChange={setSteps}>1.2k</ChipRadio>
              <ChipRadio value={4280}  current={steps} onChange={setSteps}>4.2k</ChipRadio>
              <ChipRadio value={5980}  current={steps} onChange={setSteps}>5.9k</ChipRadio>
              <ChipRadio value={6420}  current={steps} onChange={setSteps}>6.4k</ChipRadio>
            </div>
          </div>
        </div>

        {/* CENTER — the watch */}
        <div className="watch-stage">
          <WatchDevice
            sparkState={sparkState}
            silent={silent}
            sos={sos}
            parentTouchKey={parentTouchKey}
            goalKey={goalKey}
            steps={steps}
            goal={6000}
            battery={74}
            onScreenChange={setCurrentScreen}
          />
        </div>

        {/* RIGHT panel — events */}
        <div className="panel">
          <div className="panel-title">
            <span className="mono dim">PANEL/</span>
            <span className="mono accent">EVENTS</span>
          </div>

          <div className="panel-section">
            <div className="panel-label">Send to watch</div>
            <button
              className="event-btn"
              onClick={() => setParentTouchKey((k) => k + 1)}
            >
              <span className="ev-glyph">♥</span>
              <span>Parent touch</span>
              <span className="ev-hap">HAP-03</span>
            </button>
            <button
              className="event-btn"
              onClick={() => setGoalKey((k) => k + 1)}
            >
              <span className="ev-glyph">★</span>
              <span>Goal reached</span>
              <span className="ev-hap">HAP-02</span>
            </button>
          </div>

          <div className="panel-section">
            <div className="panel-label">Child-side</div>
            <button
              className="event-btn danger"
              onClick={() => setSos(true)}
            >
              <span className="ev-glyph">!</span>
              <span>Trigger SOS</span>
              <span className="ev-hap">HAP-01</span>
            </button>
            <button
              className="event-btn"
              onClick={() => setSos(false)}
              disabled={!sos}
              style={{ opacity: sos ? 1 : 0.45 }}
            >
              <span className="ev-glyph">○</span>
              <span>Clear SOS</span>
              <span className="ev-hap">ACK</span>
            </button>
          </div>

          <div className="panel-section">
            <div className="panel-label">Tip</div>
            <p style={{ font: '12px/1.45 Space Grotesk', color: 'var(--muted)', margin: 0 }}>
              Press the side button on the bracelet to cycle screens: Spark → Clock → Steps → Touch.
              The kid never sees numbers — only Spark and parent gestures.
            </p>
          </div>
        </div>
      </div>

      <footer className="footer">
        <div className="phase-line">
          <span>PHASES</span>
          <span className="phase-pill done">01 STYLE</span>
          <span className="phase-pill current">02 WATCH</span>
          <span className="phase-pill">03 SPARK</span>
          <span className="phase-pill">04 DASHBOARD</span>
        </div>
        <div>KAIRO · WATCH FACES · 2026.05</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<WatchFacesApp />);
</script>
</body>
</html>

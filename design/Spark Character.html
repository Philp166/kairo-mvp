<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kairo · Spark Character · Phase 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=VT323&display=swap" rel="stylesheet">
<style>
/* ─── THEME TOKENS ─────────────────────────────────────────── */
:root, [data-theme="light"] {
  --bg:        #FEFCF9;
  --surface:   #F7F3ED;
  --surface-2: #F0EBE0;
  --line:      #E8E0D4;
  --line-2:    #D8CFBE;
  --ink:       #1A1538;
  --ink-2:     #3D365E;
  --muted:     #8C8279;
  --accent:    #D85A30;
  --accent-2:  #E27A53;
  --lavender:  #9B8EC4;
  --ok:        #5A9A6B;
  --alert:     #D84130;
  --ink-on-accent: #FAF6EC;
  --face-default: radial-gradient(circle at 30% 25%, #E27A53 0%, #D85A30 55%, #B84520 100%);
  --face-sleep:   radial-gradient(circle at 30% 25%, #2D2654 0%, #1A1538 60%, #0F0C26 100%);
  --face-worried: radial-gradient(circle at 30% 25%, #8B1A1A 0%, #6B1010 100%);
  --glow: 0 0 0 rgba(0,0,0,0);
}
[data-theme="dark"] {
  --bg:        #0B0820;
  --surface:   #15102E;
  --surface-2: #1E1840;
  --line:      #261E48;
  --line-2:    #3A2F66;
  --ink:       #F0EBE0;
  --ink-2:     #BFB6D9;
  --muted:     #6A6190;
  --accent:    #FF6B3D;
  --accent-2:  #FF8559;
  --lavender:  #B5A8E0;
  --ok:        #6FBA82;
  --alert:     #FF4B30;
  --ink-on-accent: #FAF6EC;
  --face-default: radial-gradient(circle at 30% 25%, #FF8559 0%, #FF6B3D 50%, #C84218 100%);
  --face-sleep:   radial-gradient(circle at 30% 25%, #3A2F66 0%, #1A1538 65%, #0B0820 100%);
  --face-worried: radial-gradient(circle at 30% 25%, #B82A2A 0%, #7B0F0F 100%);
  --glow: 0 0 28px rgba(255,107,61,0.35);
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background-color: var(--bg) !important;
  color: var(--ink);
  font-family: 'Space Grotesk', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  transition: background 240ms ease, color 240ms ease;
}
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; letter-spacing: 0.06em; text-transform: uppercase; font-size: 11px; font-weight: 500; }
.mono.dim { color: var(--muted); }
.mono.accent { color: var(--accent); }
.pixel { font-family: 'VT323', monospace; }

.page { max-width: 1280px; margin: 0 auto; padding: 24px 32px 80px; }

/* TOP BAR */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 28px; border-bottom: 1px solid var(--line); margin-bottom: 36px; }
.brand { display: flex; align-items: baseline; gap: 14px; }
.brand-mark { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase; position: relative; padding-left: 16px; }
.brand-mark::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 6px; height: 6px; background: var(--accent); border-radius: 1px; box-shadow: var(--glow); }
.brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.topbar-right { display: flex; gap: 12px; align-items: center; }
.back-link { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); text-decoration: none; padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; letter-spacing: 0.1em; text-transform: uppercase; transition: all 180ms; }
.back-link:hover { color: var(--accent); border-color: var(--accent); }
.toggle { display: inline-flex; border: 1px solid var(--line-2); border-radius: 999px; padding: 3px; background: var(--surface); font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; }
.toggle button { background: transparent; border: 0; color: var(--muted); padding: 6px 14px; border-radius: 999px; cursor: pointer; font: inherit; text-transform: inherit; letter-spacing: inherit; transition: all 180ms ease; }
.toggle button.active { background: var(--ink); color: var(--bg); }

/* SECTION */
.section { margin: 56px 0; }
.section-head { display: flex; align-items: baseline; gap: 18px; margin-bottom: 28px; padding-bottom: 14px; border-bottom: 1px dashed var(--line); }
.section-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; }
.section-title { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; }
.section-sub { color: var(--muted); font-size: 13px; margin-left: auto; }

/* HERO */
.hero {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 60px;
  align-items: center;
  padding: 24px 0 48px;
}
.hero-spark { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.hero-copy h1 { font-size: clamp(40px, 5vw, 64px); font-weight: 500; letter-spacing: -0.04em; line-height: 0.95; margin: 8px 0 0; }
.hero-copy h1 em { font-style: normal; color: var(--accent); }
.hero-copy .principle { font-size: 16px; color: var(--ink-2); max-width: 560px; margin-top: 18px; line-height: 1.5; }

.state-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; }
.state-chip {
  padding: 8px 14px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  cursor: pointer;
  font: 500 11px 'JetBrains Mono', monospace;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-2);
  transition: all 160ms;
  display: flex; align-items: center; gap: 8px;
}
.state-chip:hover { border-color: var(--accent); color: var(--accent); }
.state-chip.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.state-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.8; }

.hero-stats { display: flex; gap: 24px; margin-top: 28px; flex-wrap: wrap; }
.hero-stat { display: flex; flex-direction: column; gap: 2px; }
.hero-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 22px; color: var(--accent); letter-spacing: -0.02em; }
.hero-stat-lab { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }

/* STATE STUDIES (2×2 GRID) */
.studies-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.state-study {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 22px 24px 26px;
  overflow: hidden;
}
.state-study::before {
  content: '';
  position: absolute;
  top: -1px; left: -1px;
  width: 12px; height: 12px;
  border: 1.5px solid var(--accent);
  border-right: 0; border-bottom: 0;
}
.state-study::after {
  content: '';
  position: absolute;
  bottom: -1px; right: -1px;
  width: 12px; height: 12px;
  border: 1.5px solid var(--accent);
  border-left: 0; border-top: 0;
}
.study-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px dashed var(--line-2); }
.study-id { font-size: 12px; letter-spacing: 0.2em; }
.study-breath { font-size: 11px; }
.study-main { display: flex; justify-content: center; padding: 6px 0 12px; }
.study-meta { margin-bottom: 18px; }
.study-desc { font-size: 14px; line-height: 1.4; color: var(--ink); margin-bottom: 10px; }
.study-meta-row { display: flex; gap: 12px; font-size: 10px; line-height: 1.5; margin-top: 4px; }
.study-meta-row .dim { width: 60px; flex-shrink: 0; }
.study-poses-head { font-size: 10px; margin-bottom: 10px; padding-top: 12px; border-top: 1px dashed var(--line-2); }
.study-poses-grid { display: flex; flex-wrap: wrap; gap: 10px; }

/* StaticFace */
.static-face-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.spark-stage.static { animation: none !important; }
.static-face-label { font-size: 9px; letter-spacing: 0.05em; text-transform: lowercase; }

/* REACTIONS */
.reactions-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
.reaction-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 18px 16px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  position: relative;
}
.reaction-card::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  width: 30%; height: 2px;
  background: var(--accent);
  transform: translateX(-50%);
  opacity: 0.5;
}
.reaction-head { display: flex; align-items: baseline; gap: 6px; padding-bottom: 2px; }
.reaction-main { padding: 8px 0; }
.reaction-meta { text-align: center; }
.reaction-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.reaction-desc { font-size: 10px; }

/* MOTION CHEAT SHEET */
.motion-list {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 4px 0;
}
.motion-row {
  display: grid;
  grid-template-columns: 60px 110px 1fr 220px;
  gap: 18px;
  align-items: baseline;
  padding: 14px 24px;
  border-bottom: 1px dashed var(--line-2);
  font-size: 13px;
}
.motion-row:last-child { border-bottom: 0; }
.motion-id { font-size: 11px; }
.motion-name { font-weight: 500; font-size: 14px; }
.motion-desc { color: var(--ink-2); line-height: 1.4; }
.motion-tokens { font-size: 10px; text-align: right; }

/* SPRITE SHEET */
.sprite-sheet {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 24px 26px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.sprite-row {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 24px;
  align-items: start;
  padding-bottom: 18px;
  border-bottom: 1px dashed var(--line-2);
}
.sprite-row:last-child { border-bottom: 0; padding-bottom: 0; }
.sprite-row-head { display: flex; flex-direction: column; gap: 4px; padding-top: 6px; font-size: 13px; }
.sprite-row-grid { display: flex; flex-wrap: wrap; gap: 12px; }

/* TRANSITIONS */
.transitions-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.transition-demo {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.trans-label { display: flex; gap: 10px; align-items: center; font-size: 11px; }
.trans-now { font-size: 9px; }

/* ─── SPARK COMPONENT (shared, includes reactions) ─────────── */
.spark-root { display: inline-flex; flex-direction: column; align-items: center; gap: 12px; }
.spark-stage { position: relative; border-radius: 50%; animation: spark-breath var(--breath-dur, 2s) ease-in-out infinite alternate; }
.spark-stage.state-active  { animation: spark-breath var(--breath-dur, 1s) ease-in-out infinite alternate, spark-bob 0.6s ease-in-out infinite alternate; }
.spark-stage.state-sleepy  { animation: spark-breath var(--breath-dur, 3.3s) ease-in-out infinite alternate, spark-drift 6s ease-in-out infinite alternate; }
.spark-stage.state-worried { animation: spark-breath var(--breath-dur, 1.4s) ease-in-out infinite alternate, spark-shake 0.18s steps(2) infinite; }
.spark-stage.reaction-love     { animation: spark-breath 0.9s ease-in-out infinite alternate, love-pulse 1.2s ease-in-out infinite; }
.spark-stage.reaction-celebrate { animation: spark-breath 0.7s ease-in-out infinite alternate, spark-bob 0.4s ease-in-out infinite alternate; }
.spark-stage.reaction-off { animation: none; opacity: 0.85; }
.spark-stage.reaction-low_batt { animation: spark-breath 4s ease-in-out infinite alternate; }
@keyframes love-pulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.15); } }
.spark-face { position: absolute; inset: 0; border-radius: 50%; background: var(--face-default); box-shadow: var(--glow); overflow: hidden; }
.spark-stage.state-sleepy  .spark-face { background: var(--face-sleep); }
.spark-stage.state-worried .spark-face { background: var(--face-worried); }
.spark-stage.reaction-off .spark-face { background: var(--face-sleep); }
.spark-svg { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
.spark-frame { position: absolute; inset: -6%; pointer-events: none; z-index: 3; }
.spark-frame .cf { position: absolute; width: 14%; height: 14%; border: 1.5px solid var(--accent); opacity: 0.85; }
.spark-frame .cf.tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
.spark-frame .cf.tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
.spark-frame .cf.bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
.spark-frame .cf.br { bottom: 0; right: 0; border-left: 0; border-top: 0; }
.spark-label { display: inline-flex; align-items: center; gap: 10px; padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; background: var(--surface); }

.x-sparkle   { animation: sparkle-fade 1.6s ease-in-out infinite; transform-origin: 13.5px 3.5px; }
.x-sparkle-2 { animation: sparkle-fade 1.6s ease-in-out infinite reverse; transform-origin: 2.5px 13.5px; }
.x-z         { animation: zfloat 3.4s ease-out infinite; }
.x-sweat     { animation: sweat-drip 1.8s ease-in infinite; }
.x-love-a    { animation: love-float 2.4s ease-out infinite; transform-origin: 3px 3px; }
.x-love-b    { animation: love-float 2.4s ease-out infinite 1.2s; transform-origin: 13px 4px; }
.x-confetti rect { animation: confetti-twinkle 0.9s ease-in-out infinite; }
.x-confetti .cf-2 { animation-delay: 0.1s; }
.x-confetti .cf-3 { animation-delay: 0.2s; }
.x-confetti .cf-4 { animation-delay: 0.3s; }
.x-confetti .cf-5 { animation-delay: 0.4s; }
.x-confetti .cf-6 { animation-delay: 0.5s; }
.x-confetti .cf-7 { animation-delay: 0.6s; }
.x-confetti .cf-8 { animation-delay: 0.7s; }

@keyframes spark-breath { from { transform: scale(1); } to { transform: scale(1.04); } }
@keyframes spark-bob { from { translate: 0 0; } to { translate: 0 -3%; } }
@keyframes spark-drift { 0% { translate: -1% 0; } 100% { translate: 1% 0; } }
@keyframes spark-shake { 0%,100% { transform: translate(0); } 25% { transform: translate(1px,-0.5px); } 50% { transform: translate(-1px,0.5px); } 75% { transform: translate(0.5px,1px); } }
@keyframes sparkle-fade { 0%,100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } }
@keyframes zfloat { 0% { transform: translate(0,0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translate(1.5px,-3.5px); opacity: 0; } }
@keyframes sweat-drip { 0% { transform: translate(0,0); opacity: 1; } 100% { transform: translate(0,2px); opacity: 0.3; } }
@keyframes love-float { 0% { transform: translate(0,0) scale(0.5); opacity: 0; } 30% { opacity: 1; } 100% { transform: translate(0,-3px) scale(1.2); opacity: 0; } }
@keyframes confetti-twinkle { 0%, 100% { opacity: 0.2; transform: scale(0.6); } 50% { opacity: 1; transform: scale(1.4); } }

/* FOOTER */
.footer { display: flex; justify-content: space-between; align-items: center; margin-top: 60px; padding-top: 24px; border-top: 1px solid var(--line); font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.footer .phase-line { display: flex; gap: 14px; align-items: center; }
.phase-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border: 1px solid var(--line); border-radius: 999px; }
.phase-pill.current { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.phase-pill.done { border-color: var(--ok); color: var(--ok); }

@media (max-width: 1100px) {
  .hero { grid-template-columns: 1fr; gap: 32px; }
  .studies-grid { grid-template-columns: 1fr; }
  .reactions-grid { grid-template-columns: repeat(2, 1fr); }
  .transitions-grid { grid-template-columns: repeat(2, 1fr); }
  .motion-row { grid-template-columns: 1fr; gap: 6px; }
  .sprite-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body data-theme="dark">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="spark.jsx"></script>
<script type="text/babel" src="spark-bible.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function ThemeToggle({ theme, onChange }) {
  return (
    <div className="toggle">
      <button className={theme === 'light' ? 'active' : ''} onClick={() => onChange('light')}>Light</button>
      <button className={theme === 'dark' ? 'active' : ''} onClick={() => onChange('dark')}>Dark</button>
    </div>
  );
}

function SparkCharacterApp() {
  const [theme, setTheme] = useState('dark');
  const [heroState, setHeroState] = useState('calm');

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    document.body.setAttribute('data-theme', theme);
  }, [theme]);

  const totalPoses = Object.values(FACE).reduce((s, cfg) => s + Object.keys(cfg.poses).length, 0);
  const totalReactions = Object.keys(REACTIONS).length;

  return (
    <div className="page" data-screen-label="03 Spark Character">
      <header className="topbar">
        <div className="brand">
          <span className="brand-mark">KAIRO / SPARK</span>
          <span className="brand-sub">phase 03/04 · character bible</span>
        </div>
        <div className="topbar-right">
          <a className="back-link" href="Watch Faces.html">← watch faces</a>
          <ThemeToggle theme={theme} onChange={setTheme} />
        </div>
      </header>

      {/* ─── HERO ─────────────────────────────────────────── */}
      <section className="hero">
        <div className="hero-spark">
          <Spark state={heroState} size={260} label={false} />
          <div className="state-selector">
            {['calm','active','sleepy','worried'].map((s) => (
              <button
                key={s}
                className={`state-chip ${s === heroState ? 'active' : ''}`}
                onClick={() => setHeroState(s)}
              >
                <span className="dot"></span>
                {s}
              </button>
            ))}
          </div>
        </div>
        <div className="hero-copy">
          <span className="mono accent">CHARACTER / SPARK</span>
          <h1>The one Misha<br/>actually <em>sees.</em></h1>
          <p className="principle">
            Spark lives on the wrist, 24/7, as a pixel face on a terracotta AMOLED. The child never reads numbers or graphs — only a friend whose mood reflects their own body. State is decided by sensors (HR, motion, temp, time of day); Spark is the only output.
          </p>
          <div className="hero-stats">
            <div className="hero-stat">
              <div className="hero-stat-val">4</div>
              <div className="hero-stat-lab">states</div>
            </div>
            <div className="hero-stat">
              <div className="hero-stat-val">{totalPoses}</div>
              <div className="hero-stat-lab">micro-poses</div>
            </div>
            <div className="hero-stat">
              <div className="hero-stat-val">{totalReactions}</div>
              <div className="hero-stat-lab">reactions</div>
            </div>
            <div className="hero-stat">
              <div className="hero-stat-val">16×16</div>
              <div className="hero-stat-lab">pixel grid</div>
            </div>
          </div>
        </div>
      </section>

      {/* ─── STATE STUDIES ────────────────────────────────── */}
      <section className="section">
        <div className="section-head">
          <span className="section-num">01 / STATES</span>
          <span className="section-title">Four moods, decided by the body</span>
          <span className="section-sub">each cycles through 5–6 micro-poses with weighted random timing</span>
        </div>
        <div className="studies-grid">
          <StateStudy state="calm" />
          <StateStudy state="active" />
          <StateStudy state="sleepy" />
          <StateStudy state="worried" />
        </div>
      </section>

      {/* ─── REACTIONS ────────────────────────────────────── */}
      <section className="section">
        <div className="section-head">
          <span className="section-num">02 / REACTIONS</span>
          <span className="section-title">Transient expressions for events</span>
          <span className="section-sub">override the auto-pose · live 1.5–2.4s · then return to state</span>
        </div>
        <div className="reactions-grid">
          {Object.keys(REACTIONS).map((k) => <ReactionCard key={k} reactionKey={k} />)}
        </div>
      </section>

      {/* ─── TRANSITIONS ──────────────────────────────────── */}
      <section className="section">
        <div className="section-head">
          <span className="section-num">03 / TRANSITIONS</span>
          <span className="section-title">State ↔ state</span>
          <span className="section-sub">live demos · 2.8s loop</span>
        </div>
        <div className="transitions-grid">
          <TransitionDemo from="calm" to="active" />
          <TransitionDemo from="active" to="sleepy" />
          <TransitionDemo from="sleepy" to="worried" />
          <TransitionDemo from="worried" to="calm" />
        </div>
      </section>

      {/* ─── MOTION CHEAT SHEET ───────────────────────────── */}
      <section className="section">
        <div className="section-head">
          <span className="section-num">04 / MOTION</span>
          <span className="section-title">Motion primitives</span>
          <span className="section-sub">layered per state · M-01 + M-05 + M-06 always-on</span>
        </div>
        <div className="motion-list">
          {MOTION_RULES.map((r) => <MotionRow key={r.id} rule={r} />)}
        </div>
      </section>

      {/* ─── SPRITE SHEET ─────────────────────────────────── */}
      <section className="section">
        <div className="section-head">
          <span className="section-num">05 / SPRITES</span>
          <span className="section-title">Contact sheet</span>
          <span className="section-sub">every face Spark ships with · {totalPoses + totalReactions} frames total</span>
        </div>
        <SpriteSheet />
      </section>

      {/* ─── FOOTER ───────────────────────────────────────── */}
      <footer className="footer">
        <div className="phase-line">
          <span>PHASES</span>
          <span className="phase-pill done">01 STYLE</span>
          <span className="phase-pill done">02 WATCH</span>
          <span className="phase-pill current">03 SPARK</span>
          <span className="phase-pill">04 DASHBOARD</span>
        </div>
        <div>KAIRO · SPARK BIBLE · 2026.05</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SparkCharacterApp />);
</script>
</body>

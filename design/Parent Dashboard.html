<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kairo · Parent Dashboard · Phase 4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=VT323&display=swap" rel="stylesheet">
<style>
/* ─── THEME TOKENS ─────────────────────────────────────────── */
:root, [data-theme="light"] {
  --bg:        #FEFCF9;
  --surface:   #F7F3ED;
  --surface-2: #F0EBE0;
  --line:      #E8E0D4;
  --line-2:    #D8CFBE;
  --ink:       #1A1538;
  --ink-2:     #3D365E;
  --muted:     #8C8279;
  --accent:    #D85A30;
  --accent-2:  #E27A53;
  --lavender:  #9B8EC4;
  --ok:        #5A9A6B;
  --alert:     #D84130;
  --ink-on-accent: #FAF6EC;
  --face-default: radial-gradient(circle at 30% 25%, #E27A53 0%, #D85A30 55%, #B84520 100%);
  --face-sleep:   radial-gradient(circle at 30% 25%, #2D2654 0%, #1A1538 60%, #0F0C26 100%);
  --face-worried: radial-gradient(circle at 30% 25%, #8B1A1A 0%, #6B1010 100%);
  --glow: 0 0 0 rgba(0,0,0,0);
  --shadow-card: 0 1px 0 rgba(26,21,56,0.04), 0 8px 24px -16px rgba(26,21,56,0.12);
}
[data-theme="dark"] {
  --bg:        #0B0820;
  --surface:   #15102E;
  --surface-2: #1E1840;
  --line:      #261E48;
  --line-2:    #3A2F66;
  --ink:       #F0EBE0;
  --ink-2:     #BFB6D9;
  --muted:     #6A6190;
  --accent:    #FF6B3D;
  --accent-2:  #FF8559;
  --lavender:  #B5A8E0;
  --ok:        #6FBA82;
  --alert:     #FF4B30;
  --ink-on-accent: #FAF6EC;
  --face-default: radial-gradient(circle at 30% 25%, #FF8559 0%, #FF6B3D 50%, #C84218 100%);
  --face-sleep:   radial-gradient(circle at 30% 25%, #3A2F66 0%, #1A1538 65%, #0B0820 100%);
  --face-worried: radial-gradient(circle at 30% 25%, #B82A2A 0%, #7B0F0F 100%);
  --glow: 0 0 28px rgba(255,107,61,0.35);
  --shadow-card: 0 1px 0 rgba(255,255,255,0.02), 0 8px 28px -16px rgba(0,0,0,0.6);
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background-color: var(--bg) !important;
  color: var(--ink);
  font-family: 'Space Grotesk', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  transition: background 240ms ease, color 240ms ease;
}
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; letter-spacing: 0.06em; text-transform: uppercase; font-size: 11px; font-weight: 500; }
.mono.dim { color: var(--muted); }
.mono.accent { color: var(--accent); }
.pixel { font-family: 'VT323', monospace; }

.page { max-width: 1320px; margin: 0 auto; padding: 22px 32px 80px; }

/* ─── HEADER ───────────────────────────────────────────────── */
.dash-header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 24px;
  padding: 12px 0 24px;
  margin-bottom: 32px;
  border-bottom: 1px solid var(--line);
}
.brand { display: flex; align-items: baseline; gap: 14px; }
.brand-mark { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase; position: relative; padding-left: 16px; }
.brand-mark::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 6px; height: 6px; background: var(--accent); border-radius: 1px; box-shadow: var(--glow); }
.brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.dash-header-center { display: flex; justify-content: center; }
.dash-header-right { display: flex; gap: 12px; align-items: center; justify-content: flex-end; }

.child-chip { display: flex; align-items: center; gap: 10px; padding: 6px 14px 6px 6px; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; }
.child-chip-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: var(--bg); display: grid; place-items: center; font-weight: 600; font-size: 14px; }
.child-chip-name { font-size: 13px; font-weight: 500; line-height: 1; }
.child-chip-meta { font-size: 9px; color: var(--muted); line-height: 1.2; margin-top: 2px; }
.child-chip-status { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); margin-left: 4px; }

.ble-toggle { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; cursor: pointer; font: 500 10px 'JetBrains Mono', monospace; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); transition: all 180ms; }
.ble-toggle .ble-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.ble-toggle.live { color: var(--ok); border-color: var(--ok); background: color-mix(in oklab, var(--ok) 10%, var(--surface)); }
.ble-toggle.live .ble-dot { background: var(--ok); box-shadow: 0 0 8px var(--ok); }

.back-link { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); text-decoration: none; padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; letter-spacing: 0.1em; text-transform: uppercase; transition: all 180ms; }
.back-link:hover { color: var(--accent); border-color: var(--accent); }

.toggle { display: inline-flex; border: 1px solid var(--line-2); border-radius: 0; padding: 3px; background: var(--surface); font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; }
.toggle button { background: transparent; border: 0; color: var(--muted); padding: 6px 14px; border-radius: 0; cursor: pointer; font: inherit; text-transform: inherit; letter-spacing: inherit; transition: all 180ms ease; }
.toggle button.active { background: var(--ink); color: var(--bg); }

/* ─── SECTION HEAD ─────────────────────────────────────────── */
.section { margin: 36px 0; }
.section-head { display: flex; align-items: baseline; gap: 18px; margin-bottom: 22px; padding-bottom: 12px; border-bottom: 1px dashed var(--line); }
.section-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; }
.section-title { font-size: 20px; font-weight: 500; letter-spacing: -0.02em; }
.section-sub { color: var(--muted); font-size: 12px; margin-left: auto; }

/* ─── HERO PANEL ───────────────────────────────────────────── */
.hero-panel {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 60px;
  padding: 28px 32px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 0;
  position: relative;
  margin-bottom: 36px;
}
.hero-panel::before, .hero-panel::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border: 1.5px solid var(--accent);
}
.hero-panel::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
.hero-panel::after  { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }
.hero-left { display: flex; align-items: center; justify-content: center; }

.hero-tags { display: flex; gap: 8px; align-items: center; }
.hero-tags .ok-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); }
.hero-title { font-size: clamp(36px, 4.5vw, 56px); font-weight: 500; letter-spacing: -0.03em; line-height: 1; margin: 14px 0 8px; }
.hero-sub { font-size: 17px; color: var(--ink-2); max-width: 560px; margin: 0 0 18px; line-height: 1.4; }
.hero-scrub-note { display: inline-flex; gap: 8px; align-items: center; padding: 8px 14px; background: var(--bg); border: 1px solid var(--line); border-radius: 0; font-size: 10px; margin-bottom: 16px; }
.hero-touches { margin-top: 16px; }
.hero-touches-label { font-size: 10px; margin-bottom: 10px; }
.hero-touches-row { display: flex; gap: 10px; flex-wrap: wrap; }
.hero-touches-foot { font-size: 9px; color: var(--muted); margin-top: 10px; }

/* ─── SPARK HALO ───────────────────────────────────────────── */
.spark-halo-wrap { position: relative; }
.halo-svg { position: absolute; inset: 0; }
.halo-center { position: absolute; inset: 0; margin: auto; display: grid; place-items: center; }
.halo-label { position: absolute; display: inline-flex; gap: 6px; padding: 4px 8px; background: var(--surface); border: 1px solid var(--line); border-radius: 0; font-size: 9px; }
.halo-label-t { top: -10px; left: 50%; transform: translateX(-50%); }
.halo-label-r { right: -12px; top: 50%; transform: translateY(-50%); }
.halo-label-b { bottom: -10px; left: 50%; transform: translateX(-50%); }
.halo-label-l { left: -12px; top: 50%; transform: translateY(-50%); }
.halo-pulse-hr { animation: halo-hr-pulse 0.7s ease-in-out infinite; }
@keyframes halo-hr-pulse {
  0%, 100% { stroke-width: 2.5; }
  50%      { stroke-width: 3.5; filter: drop-shadow(0 0 6px var(--accent)); }
}
.halo-dot { animation: halo-dot-spin 60s linear infinite; transform-origin: 0 0; }
@keyframes halo-dot-spin {
  0%   { transform: rotate(0deg) translateY(-128px); }
  100% { transform: rotate(360deg) translateY(-128px); }
}

/* ─── TOUCH CARTRIDGE ──────────────────────────────────────── */
.cart {
  position: relative;
  display: flex;
  flex-direction: column;
  min-width: 200px;
  padding: 0;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 0;
  cursor: pointer;
  text-align: left;
  overflow: hidden;
  transition: all 180ms ease;
  color: var(--ink);
}
.cart:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 8px 20px -10px rgba(216,90,48,0.4); }
.cart-primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.cart-primary:hover { border-color: var(--accent); }
.cart-slot { display: flex; align-items: center; gap: 12px; padding: 14px 14px 10px; position: relative; }
.cart-glyph { font-size: 20px; color: var(--accent); line-height: 1; }
.cart-primary .cart-glyph { color: var(--accent-2); }
.cart-info { flex: 1; line-height: 1.1; }
.cart-label { font-size: 14px; font-weight: 500; display: block; }
.cart-sub { font-size: 9px; color: var(--muted); margin-top: 2px; display: block; }
.cart-primary .cart-sub { color: rgba(240,235,224,0.6); }
.cart-hap { font-size: 9px; color: var(--muted); padding: 2px 6px; border: 1px solid var(--line); border-radius: 0; }
.cart-primary .cart-hap { color: rgba(240,235,224,0.6); border-color: rgba(240,235,224,0.2); }
.cart-waveform { height: 14px; padding: 0 14px; color: var(--accent); opacity: 0.6; }
.cart-primary .cart-waveform { color: var(--accent-2); }
.cart-status { display: flex; align-items: center; justify-content: space-between; padding: 6px 14px 10px; }
.cart-status-text { font-size: 8px; color: var(--muted); letter-spacing: 0.2em; }
.cart-primary .cart-status-text { color: rgba(240,235,224,0.5); }
.cart-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.cart-status-dot.fire { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
.cart.firing .cart-glyph { animation: cart-fire 0.6s ease-out; }
.cart.firing .cart-slot { animation: cart-slot-in 1.1s cubic-bezier(.2,1.4,.3,1); }
@keyframes cart-fire { 0% { transform: scale(1); } 30% { transform: scale(1.5); } 100% { transform: scale(1); } }
@keyframes cart-slot-in {
  0%   { transform: translateX(0); }
  20%  { transform: translateX(-4px); }
  100% { transform: translateX(0); }
}

/* ─── VITAL CHIP BANK ──────────────────────────────────────── */
.vital-bank { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.vital-chip {
  position: relative;
  padding: 16px 18px 18px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 0;
  overflow: hidden;
  transition: all 240ms cubic-bezier(.3,.7,.3,1);
  min-height: 180px;
}
.vital-chip:hover { transform: translateY(-2px); }
.vital-chip.expanded { padding-bottom: 70px; }
.vital-chip::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, var(--accent) 0%, transparent 50%);
  opacity: 0.04;
  pointer-events: none;
}
.vital-cb { position: absolute; width: 10px; height: 10px; border: 1px solid var(--accent); opacity: 0.6; }
.vital-cb.tl { top: 4px; left: 4px;       border-right: 0; border-bottom: 0; }
.vital-cb.tr { top: 4px; right: 4px;      border-left: 0;  border-bottom: 0; }
.vital-cb.bl { bottom: 4px; left: 4px;    border-right: 0; border-top: 0; }
.vital-cb.br { bottom: 4px; right: 4px;   border-left: 0;  border-top: 0; }
.vital-head { display: flex; justify-content: space-between; align-items: center; }
.vital-pip { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); }
.vital-pip.status-warn  { background: var(--accent); }
.vital-pip.status-alert { background: var(--alert); animation: vital-pip-pulse 1.2s infinite; }
@keyframes vital-pip-pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; transform: scale(1.4); } }
.vital-label { font-size: 9px; color: var(--muted); margin-top: 8px; }
.vital-value { display: flex; align-items: baseline; gap: 6px; margin-top: 4px; }
.vital-num { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 500; letter-spacing: -0.03em; line-height: 1; }
.vital-unit { font-size: 11px; color: var(--muted); }
.vital-delta { font-size: 10px; color: var(--muted); margin-top: 8px; }
.vital-spark { margin-top: 14px; margin-left: -2px; margin-right: -2px; }
.vital-expand { position: absolute; left: 18px; right: 18px; bottom: 14px; opacity: 0; transform: translateY(8px); transition: all 240ms ease; pointer-events: none; }
.vital-chip.expanded .vital-expand { opacity: 1; transform: translateY(0); }
.vital-range { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.vital-range-bar { flex: 1; height: 4px; background: var(--line); border-radius: 2px; position: relative; overflow: hidden; }
.vital-range-fill { position: absolute; left: 25%; right: 35%; top: 0; bottom: 0; }

/* ─── MOOD SCRUB ───────────────────────────────────────────── */
.mood-scrub { background: var(--surface); border: 1px solid var(--line); border-radius: 0; padding: 22px 26px 18px; position: relative; }
.mood-scrub-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
.mood-scrub-display { display: flex; align-items: center; gap: 18px; margin-bottom: 16px; min-height: 56px; }
.mood-card { display: flex; align-items: center; gap: 14px; padding: 10px 18px; background: var(--bg); border: 1px solid var(--line); border-radius: 0; position: relative; }
.mood-card::before { content: ''; position: absolute; top: -1px; left: -1px; width: 8px; height: 8px; border: 1px solid var(--accent); border-right: 0; border-bottom: 0; }
.mood-card-state { display: inline-flex; gap: 6px; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.15em; font-weight: 600; }
.mood-dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 6px currentColor; }
.mood-card-note { font-size: 14px; color: var(--ink-2); }

.mood-track {
  position: relative;
  height: 56px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 0;
  margin-top: 4px;
  user-select: none;
  cursor: grab;
}
.mood-track:active { cursor: grabbing; }
.mood-seg { position: absolute; top: 4px; bottom: 4px; opacity: 0.85; transition: opacity 160ms; }
.mood-seg:hover { opacity: 1; }
.mood-hover { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--accent); opacity: 0.4; pointer-events: none; transform: translateX(-0.5px); }
.mood-playhead { position: absolute; top: -10px; bottom: -10px; width: 2px; pointer-events: none; transform: translateX(-1px); transition: left 120ms ease-out; }
.mood-playhead.dragging { transition: none; }
.mood-playhead-stick { position: absolute; left: 0; top: 0; bottom: 24px; width: 2px; background: var(--ink); }
.mood-playhead-handle { position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); width: 22px; height: 22px; background: var(--accent); border-radius: 0; cursor: grab; box-shadow: 0 4px 12px -4px var(--accent); }
.mood-playhead-handle .cf { position: absolute; width: 5px; height: 5px; border: 1px solid var(--bg); opacity: 0.8; }
.mood-playhead-handle .cf.tl { top: 2px; left: 2px;       border-right: 0; border-bottom: 0; }
.mood-playhead-handle .cf.tr { top: 2px; right: 2px;      border-left: 0;  border-bottom: 0; }
.mood-playhead-handle .cf.bl { bottom: 2px; left: 2px;    border-right: 0; border-top: 0; }
.mood-playhead-handle .cf.br { bottom: 2px; right: 2px;   border-left: 0;  border-top: 0; }

.mood-ticks { position: relative; height: 16px; margin-top: 4px; }
.mood-tick { position: absolute; transform: translateX(-50%); font-size: 9px; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; }
.mood-tick::before { content: ''; position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 1px; height: 4px; background: var(--muted); opacity: 0.5; }

.mood-legend { display: flex; gap: 18px; margin-top: 14px; font-size: 9px; color: var(--muted); }
.mood-legend > span { display: inline-flex; align-items: center; gap: 6px; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ─── HR TREND ─────────────────────────────────────────────── */
.hr-trend { background: var(--surface); border: 1px solid var(--line); border-radius: 0; padding: 20px 24px; }
.hr-trend-head { display: flex; justify-content: space-between; margin-bottom: 14px; }
.hr-trend-svg { width: 100%; height: 180px; display: block; }
.hr-trend-legend { display: flex; gap: 18px; font-size: 9px; color: var(--muted); margin-top: 6px; }
.hr-trend-legend > span { display: inline-flex; align-items: center; gap: 6px; }
.leg { width: 18px; height: 4px; border-radius: 2px; }
.leg-area { background: var(--accent); opacity: 0.4; }
.leg-thresh { background: var(--alert); opacity: 0.5; }
.leg-base { background: var(--muted); opacity: 0.4; }
.leg-sleep { background: var(--lavender); opacity: 0.4; }

/* ─── STAT TILE ────────────────────────────────────────────── */
.stat-tile { background: var(--surface); border: 1px solid var(--line); border-radius: 0; padding: 16px 18px; position: relative; min-height: 130px; display: flex; flex-direction: column; }
.stat-tile::before { content: ''; position: absolute; top: 0; left: 0; width: 30px; height: 2px; background: var(--accent); }
.stat-head { margin-bottom: 8px; }
.stat-label { font-size: 9px; color: var(--muted); margin-top: 4px; }
.stat-value { display: flex; align-items: baseline; gap: 6px; margin-top: 4px; }
.stat-num { font-family: 'JetBrains Mono', monospace; font-size: 30px; font-weight: 500; letter-spacing: -0.03em; line-height: 1; }
.stat-unit { font-size: 11px; color: var(--muted); }
.stat-sub { font-size: 9px; color: var(--muted); margin-top: auto; padding-top: 8px; }
.hrv-gauge { display: block; margin: 8px auto 0; }

/* ─── PANEL CARDS (schedule, radar, tape) ──────────────────── */
.panel-card { position: relative; background: var(--surface); border: 1px solid var(--line); border-radius: 0; padding: 20px 24px; }
.panel-card::before, .panel-card::after { content: ''; position: absolute; width: 12px; height: 12px; border: 1.5px solid var(--accent); }
.panel-card::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
.panel-card::after  { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }
.panel-card-head { display: flex; gap: 8px; align-items: baseline; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px dashed var(--line-2); }

/* Schedule arc */
.sched-card .sched-arc-wrap { display: flex; justify-content: center; padding: 8px 0; }
.sched-rows { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
.sched-row { display: flex; align-items: center; gap: 10px; font-size: 11px; padding: 8px 10px; background: var(--bg); border: 1px solid var(--line); border-radius: 0; }
.sched-swatch { width: 10px; height: 10px; border-radius: 2px; }

/* Location radar (stylized map) */
.radar-card .radar-wrap { display: block; padding: 8px 0; }
.radar-card .radar-svg { display: block; width: 100%; height: auto; border-radius: 0; background: var(--bg); }
.radar-sweep { transform-origin: 0 0; animation: radar-sweep 5s linear infinite; }
@keyframes radar-sweep { from { transform: rotate(0); } to { transform: rotate(360deg); } }
.radar-pulse { animation: radar-pulse-anim 2.2s ease-out infinite; transform-origin: center; transform-box: fill-box; }
@keyframes radar-pulse-anim { 0% { r: 8; opacity: 0.9; } 100% { r: 28; opacity: 0; } }
.radar-pulse-2 { animation: radar-pulse-anim 2.2s ease-out 1.1s infinite; transform-origin: center; transform-box: fill-box; }
.radar-meta { display: flex; gap: 10px; align-items: center; margin-top: 8px; padding: 8px 10px; background: var(--bg); border: 1px solid var(--line); border-radius: 0; font-size: 10px; flex-wrap: wrap; }

/* Activity tape */
.tape-strip { display: flex; flex-direction: column; }
.tape-row { display: grid; grid-template-columns: 70px 28px 1fr 80px 80px; gap: 14px; align-items: center; padding: 12px 4px; border-bottom: 1px dashed var(--line-2); position: relative; }
.tape-row:last-child { border-bottom: 0; }
.tape-row::before {
  content: '';
  position: absolute;
  left: -8px; top: 50%; transform: translateY(-50%);
  width: 4px; height: 4px;
  background: var(--accent); opacity: 0.6;
  border-radius: 50%;
}
.tape-time { font-size: 10px; color: var(--muted); }
.tape-glyph { font-size: 14px; color: var(--accent); text-align: center; }
.tape-row.tape-sos .tape-glyph { color: var(--alert); }
.tape-row.tape-sos { background: linear-gradient(90deg, color-mix(in oklab, var(--alert) 8%, transparent), transparent); }
.tape-row.tape-touch .tape-glyph { color: var(--accent); }
.tape-row.tape-geo .tape-glyph   { color: var(--ok); }
.tape-row.tape-spike .tape-glyph { color: var(--alert); }
.tape-msg { font-size: 13px; color: var(--ink); line-height: 1.3; }
.tape-hap { font-size: 9px; text-align: right; }
.tape-waveform { color: var(--accent); }
.tape-row.tape-sos .tape-waveform   { color: var(--alert); }
.tape-row.tape-spike .tape-waveform { color: var(--alert); }
.tape-row.tape-geo .tape-waveform   { color: var(--ok); }

/* ─── SPLIT ROWS ───────────────────────────────────────────── */
.split-3-1 { display: grid; grid-template-columns: 3fr 1fr; gap: 14px; }
.split-1-1 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.split-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ─── TOAST ────────────────────────────────────────────────── */
.toast {
  position: fixed;
  right: 32px; bottom: 32px;
  display: flex; align-items: center; gap: 16px;
  padding: 14px 18px;
  background: var(--surface); border: 1px solid var(--accent);
  border-radius: 0;
  box-shadow: 0 12px 30px -10px rgba(255,107,61,0.3);
  z-index: 100;
  animation: toast-in 360ms cubic-bezier(.3,1.2,.3,1);
}
@keyframes toast-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.toast-glyph { font-size: 24px; color: var(--accent); }
.toast-title { font-size: 14px; font-weight: 500; }
.toast-sub { font-size: 9px; color: var(--muted); margin-top: 2px; }
.toast-wave { width: 80px; color: var(--accent); }

/* ─── SPARK (shared) ───────────────────────────────────────── */
.spark-root { display: inline-flex; flex-direction: column; align-items: center; gap: 12px; }
.spark-stage { position: relative; border-radius: 50%; animation: spark-breath var(--breath-dur, 2s) ease-in-out infinite alternate; }
.spark-stage.state-active  { animation: spark-breath var(--breath-dur, 1s) ease-in-out infinite alternate, spark-bob 0.6s ease-in-out infinite alternate; }
.spark-stage.state-sleepy  { animation: spark-breath var(--breath-dur, 3.3s) ease-in-out infinite alternate, spark-drift 6s ease-in-out infinite alternate; }
.spark-stage.state-worried { animation: spark-breath var(--breath-dur, 1.4s) ease-in-out infinite alternate, spark-shake 0.18s steps(2) infinite; }
.spark-stage.reaction-love     { animation: spark-breath 0.9s ease-in-out infinite alternate, love-pulse 1.2s ease-in-out infinite; }
.spark-stage.reaction-celebrate { animation: spark-breath 0.7s ease-in-out infinite alternate, spark-bob 0.4s ease-in-out infinite alternate; }
.spark-stage.reaction-off { animation: none; opacity: 0.85; }
.spark-stage.reaction-low_batt { animation: spark-breath 4s ease-in-out infinite alternate; }
@keyframes love-pulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.15); } }
.spark-face { position: absolute; inset: 0; border-radius: 50%; background: var(--face-default); box-shadow: var(--glow); overflow: hidden; }
.spark-stage.state-sleepy  .spark-face { background: var(--face-sleep); }
.spark-stage.state-worried .spark-face { background: var(--face-worried); }
.spark-stage.reaction-off .spark-face { background: var(--face-sleep); }
.spark-svg { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
.spark-frame { position: absolute; inset: -6%; pointer-events: none; z-index: 3; }
.spark-frame .cf { position: absolute; width: 14%; height: 14%; border: 1.5px solid var(--accent); opacity: 0.85; }
.spark-frame .cf.tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
.spark-frame .cf.tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
.spark-frame .cf.bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
.spark-frame .cf.br { bottom: 0; right: 0; border-left: 0; border-top: 0; }
.spark-label { display: inline-flex; align-items: center; gap: 10px; padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; background: var(--surface); }

.x-sparkle   { animation: sparkle-fade 1.6s ease-in-out infinite; transform-origin: 13.5px 3.5px; }
.x-sparkle-2 { animation: sparkle-fade 1.6s ease-in-out infinite reverse; transform-origin: 2.5px 13.5px; }
.x-z         { animation: zfloat 3.4s ease-out infinite; }
.x-sweat     { animation: sweat-drip 1.8s ease-in infinite; }
.x-love-a    { animation: love-float 2.4s ease-out infinite; transform-origin: 3px 3px; }
.x-love-b    { animation: love-float 2.4s ease-out infinite 1.2s; transform-origin: 13px 4px; }
.x-confetti rect { animation: confetti-twinkle 0.9s ease-in-out infinite; }
.x-confetti .cf-2 { animation-delay: 0.1s; }
.x-confetti .cf-3 { animation-delay: 0.2s; }
.x-confetti .cf-4 { animation-delay: 0.3s; }
.x-confetti .cf-5 { animation-delay: 0.4s; }
.x-confetti .cf-6 { animation-delay: 0.5s; }
.x-confetti .cf-7 { animation-delay: 0.6s; }
.x-confetti .cf-8 { animation-delay: 0.7s; }

@keyframes spark-breath { from { transform: scale(1); } to { transform: scale(1.04); } }
@keyframes spark-bob { from { translate: 0 0; } to { translate: 0 -3%; } }
@keyframes spark-drift { 0% { translate: -1% 0; } 100% { translate: 1% 0; } }
@keyframes spark-shake { 0%,100% { transform: translate(0); } 25% { transform: translate(1px,-0.5px); } 50% { transform: translate(-1px,0.5px); } 75% { transform: translate(0.5px,1px); } }
@keyframes sparkle-fade { 0%,100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } }
@keyframes zfloat { 0% { transform: translate(0,0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translate(1.5px,-3.5px); opacity: 0; } }
@keyframes sweat-drip { 0% { transform: translate(0,0); opacity: 1; } 100% { transform: translate(0,2px); opacity: 0.3; } }
@keyframes love-float { 0% { transform: translate(0,0) scale(0.5); opacity: 0; } 30% { opacity: 1; } 100% { transform: translate(0,-3px) scale(1.2); opacity: 0; } }
@keyframes confetti-twinkle { 0%, 100% { opacity: 0.2; transform: scale(0.6); } 50% { opacity: 1; transform: scale(1.4); } }

/* ─── FOOTER ───────────────────────────────────────────────── */
.footer { display: flex; justify-content: space-between; align-items: center; margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--line); font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.footer .phase-line { display: flex; gap: 14px; align-items: center; }
.phase-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border: 1px solid var(--line); border-radius: 999px; }
.phase-pill.current { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.phase-pill.done { border-color: var(--ok); color: var(--ok); }

/* ─── RESPONSIVE ───────────────────────────────────────────── */
@media (max-width: 1080px) {
  .dash-header { grid-template-columns: 1fr; gap: 14px; }
  .dash-header-center, .dash-header-right { justify-content: flex-start; }
  .hero-panel { grid-template-columns: 1fr; gap: 24px; padding: 24px; }
  .vital-bank { grid-template-columns: repeat(2, 1fr); }
  .split-3-1, .split-1-1 { grid-template-columns: 1fr; }
  .split-stats { grid-template-columns: 1fr 1fr; }
  .tape-row { grid-template-columns: 60px 1fr; }
  .tape-row > * { font-size: 11px; }
}
/* ─── CAROUSEL ─────────────────────────────────────────────── */
.carousel { display: flex; flex-direction: column; gap: 12px; }
.carousel-rail { overflow: hidden; position: relative; }
.carousel-rail::before, .carousel-rail::after {
  content: ''; position: absolute; top: 0; bottom: 0; width: 24px; z-index: 2; pointer-events: none;
}
.carousel-rail::before { left: 0; background: linear-gradient(to right, var(--bg), transparent); }
.carousel-rail::after  { right: 0; background: linear-gradient(to left,  var(--bg), transparent); }
.carousel-track { display: flex; transition: transform 420ms cubic-bezier(.3,.7,.3,1); will-change: transform; }
.carousel-cell { min-width: 0; padding: 0 8px; box-sizing: border-box; }
.carousel-cell > * { width: 100%; }
.carousel-ctrl {
  display: flex; align-items: center; gap: 14px;
  padding: 8px 12px;
  background: var(--surface); border: 1px solid var(--line);
  font-family: 'JetBrains Mono', monospace;
}
.carousel-btn {
  width: 36px; height: 36px;
  background: var(--bg); border: 1px solid var(--line-2); color: var(--ink);
  font-size: 20px; line-height: 1; cursor: pointer;
  transition: all 140ms ease; font-family: inherit;
  display: grid; place-items: center;
}
.carousel-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.carousel-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.carousel-counter { font-size: 12px; letter-spacing: 0.18em; min-width: 64px; }
.carousel-dots { display: inline-flex; gap: 5px; flex: 1; justify-content: center; }
.carousel-dot { width: 26px; height: 4px; background: var(--line-2); border: 0; cursor: pointer; transition: all 200ms; padding: 0; }
.carousel-dot.on { background: var(--accent); width: 38px; }
.carousel-dot:hover { background: var(--accent-2); }
.carousel-label { letter-spacing: 0.18em; font-size: 10px; }

/* ─── LANG TOGGLE (matches .toggle) ────────────────────────── */
.lang-toggle { display: inline-flex; border: 1px solid var(--line-2); padding: 3px; background: var(--surface); font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; }
.lang-toggle button { background: transparent; border: 0; color: var(--muted); padding: 6px 10px; cursor: pointer; font: inherit; text-transform: uppercase; letter-spacing: inherit; transition: all 140ms; }
.lang-toggle button.active { background: var(--ink); color: var(--bg); }

</style>
</head>
<body data-theme="dark">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="i18n.jsx"></script>
<script type="text/babel" src="carousel.jsx"></script>
<script type="text/babel" src="spark.jsx"></script>
<script type="text/babel" src="dashboard-vitals.jsx"></script>
<script type="text/babel" src="dashboard-timeline.jsx"></script>
<script type="text/babel" src="dashboard-hero.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function DashboardApp() {
  const [theme, setTheme] = useState('dark');
  const [lang, setLang]   = useState('ru');
  const [scrubHour, setScrubHour] = useState(23); // start at "now" (last hour)
  const [ble, setBle] = useState('mock');
  const [toast, setToast] = useState(null);

  const t = React.useMemo(() => window.makeT(lang), [lang]);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    document.body.setAttribute('data-theme', theme);
  }, [theme]);

  useEffect(() => {
    document.documentElement.setAttribute('lang', lang);
  }, [lang]);

  // Scrubbed state = the mood at the scrub time
  const moment = DAY_MOODS[scrubHour];
  const sparkState = moment.state;

  const hrDelta = HR_24H[scrubHour] - 78;
  // Vitals (current snapshot — could vary by scrub but keep "now")
  const vitals = {
    hr:    { slot: 'HR_01',   label: t('v.hr.label'),    value: HR_24H[scrubHour],   unit: 'bpm', delta: `${t('v.hr.delta')}${hrDelta > 0 ? '+' : ''}${hrDelta}`, status: HR_24H[scrubHour] > 120 ? 'alert' : HR_24H[scrubHour] > 100 ? 'warn' : 'norm', color: 'var(--accent)', data: HR_24H },
    spo2:  { slot: 'SPO2_02', label: t('v.spo2.label'),  value: SPO2_24H[scrubHour], unit: '%',  delta: t('v.spo2.delta'), status: 'norm', color: 'var(--ok)', data: SPO2_24H },
    temp:  { slot: 'TEMP_03', label: t('v.temp.label'),  value: (TEMP_DELTA_24H[scrubHour] >= 0 ? '+' : '') + TEMP_DELTA_24H[scrubHour].toFixed(1), unit: '°C', delta: t('v.temp.delta'), status: Math.abs(TEMP_DELTA_24H[scrubHour]) > 0.2 ? 'warn' : 'norm', color: 'var(--lavender)', data: TEMP_DELTA_24H },
    steps: { slot: 'STEP_04', label: t('v.step.label'),  value: STEPS_24H[scrubHour].toLocaleString(), unit: '·', delta: `${t('v.step.delta')} · ${Math.round(STEPS_24H[scrubHour]/60)}%`, status: 'norm', color: 'var(--accent-2)', data: STEPS_24H },
    battery: { value: 74, color: 'var(--ok)' },
  };

  function onTouch(kind) {
    const map = {
      hug:     { glyph: '♥', title: t('toast.hug.title'),   hap: 'HAP-03', sub: t('toast.hug.sub') },
      cheer:   { glyph: '★', title: t('toast.cheer.title'), hap: 'HAP-02', sub: t('toast.cheer.sub') },
      bedtime: { glyph: '☾', title: t('toast.bed.title'),   hap: 'HAP-04', sub: t('toast.bed.sub') },
    };
    setToast(map[kind]);
  }

  return (
    <window.LangCtx.Provider value={{ lang, t }}>
    <div className="page" data-screen-label="04 Parent Dashboard">
      <DashboardHeader
        theme={theme} onTheme={setTheme}
        lang={lang}   onLang={setLang}
        ble={ble} onToggleBle={() => setBle((b) => b === 'live' ? 'mock' : 'live')}
      />

      <HeroPanel
        sparkState={sparkState}
        scrubMoment={moment}
        scrubHour={scrubHour}
        vitals={vitals}
        onTouch={onTouch}
      />

      {/* ─── VITALS (slider) ─────────────────────────────── */}
      <section className="section">
        <div className="section-head">
          <span className="section-num">01 / VITALS</span>
          <span className="section-title">{t('sec.vitals.title')}</span>
          <span className="section-sub">{t('sec.vitals.sub')}</span>
        </div>
        <Carousel
          items={[vitals.hr, vitals.spo2, vitals.temp, vitals.steps]}
          perPage={2}
          label={t('carousel.vitals')}
          renderItem={(v) => <VitalChip {...v} scrubHour={scrubHour} />}
        />
      </section>

      {/* ─── MOOD SCRUB ──────────────────────────────────── */}
      <section className="section">
        <div className="section-head">
          <span className="section-num">02 / SCRUB</span>
          <span className="section-title">{t('sec.scrub.title')}</span>
          <span className="section-sub">{t('sec.scrub.sub')}</span>
        </div>
        <MoodScrub scrubHour={scrubHour} onScrub={setScrubHour} />
      </section>

      {/* ─── TRENDS ──────────────────────────────────────── */}
      <section className="section">
        <div className="section-head">
          <span className="section-num">03 / TRENDS</span>
          <span className="section-title">{t('sec.trends.title')}</span>
          <span className="section-sub">{t('sec.trends.sub')}</span>
        </div>
        <div className="split-3-1">
          <HrTrendChart data={HR_24H} scrubHour={scrubHour} />
          <div className="split-stats" style={{ gridTemplateColumns: '1fr' }}>
            <StatTile slot="SLP_05" label={t('stat.sleep.label')} value="8:24" unit="h:m" sub={t('stat.sleep.sub')} color="var(--accent)" />
            <StatTile slot="HRV_06" label={t('stat.hrv.label')} value="42" unit="ms" sub={t('stat.hrv.sub')} color="var(--accent)">
              <HrvGauge value={42} />
            </StatTile>
          </div>
        </div>
      </section>

      {/* ─── SCHEDULE + LOCATION ─────────────────────────── */}
      <section className="section">
        <div className="section-head">
          <span className="section-num">04 / RHYTHM</span>
          <span className="section-title">{t('sec.rhythm.title')}</span>
          <span className="section-sub">{t('sec.rhythm.sub')}</span>
        </div>
        <div className="split-1-1">
          <ScheduleArc />
          <LocationRadar />
        </div>
      </section>

      {/* ─── ACTIVITY TAPE ───────────────────────────────── */}
      <section className="section">
        <div className="section-head">
          <span className="section-num">05 / TAPE</span>
          <span className="section-title">{t('sec.tape.title')}</span>
          <span className="section-sub">{t('sec.tape.sub')}</span>
        </div>
        <ActivityTape />
      </section>

      {/* ─── WATCH PREVIEW LINK ──────────────────────────── */}
      <section className="section">
        <a href="Watch Faces.html" className="panel-card" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 20, textDecoration: 'none', color: 'inherit' }}>
          <div>
            <div className="mono dim">{t('probe.head')}</div>
            <div style={{ fontSize: 20, fontWeight: 500, marginTop: 4 }}>{t('probe.title')}</div>
            <div className="mono dim" style={{ marginTop: 6, textTransform: 'none', letterSpacing: '0.04em' }}>{t('probe.sub')}</div>
          </div>
          <Spark state={sparkState} size={70} label={false} frame={false} />
        </a>
      </section>

      <footer className="footer">
        <div className="phase-line">
          <span>{t('footer.phases')}</span>
          <span className="phase-pill done">01 STYLE</span>
          <span className="phase-pill done">02 WATCH</span>
          <span className="phase-pill done">03 SPARK</span>
          <span className="phase-pill current">04 DASHBOARD</span>
        </div>
        <div>{t('footer.tag')}</div>
      </footer>

      <Toast toast={toast} onDismiss={() => setToast(null)} />
    </div>
    </window.LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DashboardApp />);
</script>
</body>
</html>

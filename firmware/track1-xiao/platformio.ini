; Kairo Track 1 — Seeed XIAO ESP32-S3 + GC9A01 + MAX30102 + MLX90614 + IMU
; Display: GC9A01 1.28" round IPS 240×240 (SPI)
; MCU:     ESP32-S3 (XIAO form factor, 8MB flash)

[env:xiao-esp32s3]
platform = espressif32@6.7.0
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -I${PROJECT_DIR}/../shared
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DKAIRO_TRACK=1
    -DKAIRO_DISPLAY_W=240
    -DKAIRO_DISPLAY_H=240
    ; --- TFT_eSPI for GC9A01 ---
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MISO=-1
    -DTFT_MOSI=9
    -DTFT_SCLK=8
    -DTFT_CS=44
    -DTFT_DC=43
    -DTFT_RST=21
    -DTFT_BL=-1
    -DLOAD_GLCD=1
    -DSPI_FREQUENCY=40000000
    ; --- I2C pins (XIAO defaults) ---
    -DKAIRO_I2C_SDA=5
    -DKAIRO_I2C_SCL=6

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    adafruit/Adafruit MLX90614 Library @ ^2.1.5
    adafruit/Adafruit MPU6050 @ ^2.2.6
    bblanchon/ArduinoJson @ ^7.0.4

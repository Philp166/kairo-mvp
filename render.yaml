# Render Blueprint — kairo-mvp
# https://render.com/docs/blueprint-spec

databases:
  - name: kairo-db
    plan: free
    databaseName: kairo
    user: kairo

services:
  - type: web
    name: kairo-mvp
    runtime: node
    plan: free
    buildCommand: |
      cd dashboard && npm ci && npm run build &&
      cd ../server && npm ci && npm run build &&
      npm run db:init
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kairo-db
          property: connectionString
